<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Accessible Form</title>

        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="flex container-form">
            <form action="#" method="post" class="flex col form-group">
                <div class="flex col user-infos">
                    <div class="flex col">
                        <label for="full-name">Full name</label>
                        <input
                            type="text"
                            id="full-name"
                            name="full-name"
                            placeholder="What should we call you?"
                            aria-required="true"
                        />
                    </div>
                    <div class="flex col">
                        <label for="email">Email</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="youremail@email.com"
                            aria-required="true"
                            aria-invalid="true"
                        />
                    </div>
                </div>

                <div class="flex col pass-infos">
                    <div class="flex col">
                        <label for="password">Enter Password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="******"
                            aria-required="true"
                        />
                        <button
                            type="button"
                            class="show-password-btn"
                            aria-label="Password is hidden"
                            aria-pressed="false"
                        >
                            <img src="spy-eye-open.svg" alt="" />
                        </button>
                    </div>
                    <div class="flex col">
                        <label for="confirm-password">Confirm Password</label>
                        <input
                            type="password"
                            id="confirm-password"
                            name="confirm-password"
                            placeholder="******"
                            aria-required="true"
                        />
                        <button
                            type="button"
                            class="show-password-btn"
                            aria-label="Password is hidden"
                            aria-pressed="false"
                        >
                            <img src="spy-eye-open.svg" alt="" />
                        </button>
                        <span class="error-message">Passwords must match</span>
                    </div>
                    <div class="btn-container">
                        <button type="submit" class="subimit-btn">
                            Update Profile
                        </button>
                    </div>
                </div>
            </form>

            <div class="flex col aside-container">
                <div class="flex col progress-container">
                    <div class="progress-bar">
                        <div class="progress"></div>
                    </div>
                    <span class="progress-percentage">65%</span>
                </div>
                <p class="footer-progress">Profile Completeness</p>
                <div class="form-footer">
                    <ul class="flex col checklist">
                        <li class="complete">Create Account</li>
                        <li class="complete">Update Roadmap Progress</li>
                        <li class="complete">Setup Public Profile</li>
                        <li class="incomplete">Complete your first project</li>
                        <li class="incomplete">Invite your Friends</li>
                    </ul>
                </div>
            </div>
        </div>
    </body>
</html>
