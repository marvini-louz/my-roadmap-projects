        <link
            rel="stylesheet"
            href="/02-1-personal-portifolio/CSS/contact.css"
        />
    </head>

    <body>
        <header class="flex navigate-menu">
            <div class="flex name-logo">
                <a href="/02-1-personal-portifolio/HTML/index.html"
                    ><img
                        class="logo-profile"
                        id="logo-profile"
                        src="https://github.com/marvini-louz.png"
                        alt="Profile Image"
                /></a>
                <h2>Marcelo Vinícius</h2>
            </div>
            <nav>
                <ul class="flex menu-superior">
                    <li>
                        <a href="/02-1-personal-portifolio/HTML/index.html"
                            >Home</a
                        >
                    </li>
                    <li>
                        <a href="/02-1-personal-portifolio/HTML/projects.html"
                            >Projects</a
                        >
                    </li>
                    <li>
                        <a href="/02-1-personal-portifolio/HTML/articles.html"
                            >Articles</a
                        >
                    </li>
                    <li>
                        <a href="/02-1-personal-portifolio/HTML/contact.html"
                            >Contact</a
                        >
                    </li>
                </ul>
            </nav>
        </header>

        <main>
            <div class="flex hero">
                <div class="flex col subheading">
                    <h1>Frontend Developer</h1>
                    <p>HTML and CSS stylized.</p>
                </div>
            </div>

            <section id="contact">
                <div class="subheading">
                    <h3>Contact</h3>
                </div>
                <div>
                    <p>
                        If you have any questions, please email me at:
                        contato@sigmit.com.br
                    </p>
                    <fieldset>
                        <form action="/my-handling-form-page" method="get">
                            <p>
                                <label for="name">Name:</label>
                                <input type="text" id="name" name="user_name" />
                            </p>
                            <p>
                                <label for="mail">Email:</label>
                                <input
                                    type="email"
                                    id="mail"
                                    name="user_email"
                                />
                            </p>
                            <p>
                                <label for="msg">Message:</label>
                                <textarea
                                    id="msg"
                                    name="user_message"
                                ></textarea>
                            </p>
                            <p class="button">
                                <button type="submit">Send your message</button>
                            </p>
                        </form>
                    </fieldset>
                </div>
            </section>
        </main>
        <footer class="flex">
            <p>all rights reserved 2026.</p>
        </footer>
    </body>
</html>
