<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Datepicker UI</title>

        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <main>
            <section class="flex col datepicker-container">
                <div class="flex container-input">
                    <input
                        type="datetime"
                        name="date"
                        id="date"
                        placeholder="dd/mm/yyyy"
                    />
                    <button type="button">
                        <img src="calendar.svg" alt="calendar icon" />
                    </button>
                </div>

                <div class="flex col calendar-container">
                    <div class="square-item">
                        <div class="flex container-header">
                            <button type="button">
                                <img
                                    src="arrow-left.svg"
                                    alt="arrow left icon"
                                />
                            </button>
                            <span>April 2026</span>
                            <button type="button">
                                <img
                                    src="arrow-right.svg"
                                    alt="arrow right icon"
                                />
                            </button>
                        </div>

                        <div class="weekdays">
                            <div>Sun</div>
                            <div>Mon</div>
                            <div>Tue</div>
                            <div>Wed</div>
                            <div>Thu</div>
                            <div>Fri</div>
                            <div>Sat</div>
                        </div>
                    </div>

                    <div class="month-days">
                        <div class="day-out-month">29</div>
                        <div class="day-out-month">30</div>
                        <div class="day-out-month">31</div>
                        <div class="day-on-month">1</div>
                        <div class="day-on-month">2</div>
                        <div class="day-on-month">3</div>
                        <div class="day-on-month">4</div>
                        <div class="day-on-month">5</div>
                        <div class="day-on-month">6</div>
                        <div class="day-on-month">7</div>
                        <div class="day-on-month">8</div>
                        <div class="day-on-month">9</div>
                        <div class="day-on-month">10</div>
                        <div class="day-on-month">11</div>
                        <div class="day-on-month">12</div>
                        <div class="day-on-month">13</div>
                        <div class="day-on-month">14</div>
                        <div class="day-on-month">15</div>
                        <div class="day-on-month">16</div>
                        <div class="day-on-month">17</div>
                        <div class="day-on-month">18</div>
                        <div class="day-on-month">19</div>
                        <div class="day-on-month">20</div>
                        <div class="day-on-month">21</div>
                        <div class="day-on-month">22</div>
                        <div class="day-on-month">23</div>
                        <div class="day-on-month">24</div>
                        <div class="day-on-month">25</div>
                        <div class="day-on-month">26</div>
                        <div class="day-on-month">27</div>
                        <div class="day-on-month">28</div>
                        <div class="day-on-month">29</div>
                        <div class="day-on-month">30</div>
                        <div class="day-out-month">1</div>
                        <div class="day-out-month">2</div>
                    </div>
                </div>
            </section>
        </main>
    </body>
</html>
